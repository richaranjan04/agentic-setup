<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Search Admin Console — Demo</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-page:#EEECEA;--bg-card:#FFFFFF;--bg-otto-panel:#F2F1EE;--bg-otto-header:#1B1B19;--bg-nav:#1C1C1A;--bg-nav-hover:#2A2A28;--bg-input:#FFFFFF;--bg-tag-gray:#F0EFEB;--green-brand:#00C950;--green-brand-dark:#00A843;--green-text:#186A3B;--green-bg:#E8F9EF;--green-running-bg:#DCFCE7;--amber:#D97706;--amber-bg:#FEF3C7;--amber-text:#92400E;--red:#DC2626;--red-bg:#FEE2E2;--red-text:#7F1D1D;--blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-text:#1E3A5F;--text-primary:#1A1A18;--text-secondary:#6B7280;--text-muted:#9CA3AF;--text-link:#186A3B;--border-light:#E5E3DF;--border-medium:#D0CEC9;--border-otto-input:#E0DEDB;--shadow-card:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);--shadow-card-lg:0 4px 12px rgba(0,0,0,0.08);--shadow-otto:2px 0 8px rgba(0,0,0,0.06);--radius-sm:6px;--radius-md:10px;--radius-lg:12px;--radius-pill:999px;--radius-input:8px;--nav-width:64px;--otto-width:40vw}
html,body{height:100%;margin:0;padding:0}
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.55;color:var(--text-primary);background:var(--bg-page)}
:focus-visible{outline:2px solid var(--green-brand);outline-offset:2px}
:focus:not(:focus-visible){outline:none}
button{font-family:inherit;border:none;background:none;padding:0;cursor:pointer}
input{font-family:inherit}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ottoPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@keyframes progressPulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes pulseHighlight{0%{background:rgba(0,201,80,.15)}100%{background:transparent}}
.left-nav{width:var(--nav-width);min-width:var(--nav-width);background:var(--bg-nav);display:flex;flex-direction:column;align-items:center;flex-shrink:0;height:100%;padding:12px 0}
.nav-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.6);transition:background .15s,color .15s;border-radius:50%;margin:2px 0}
.nav-icon:hover{color:rgba(255,255,255,1)}
.nav-icon.active{background:#E5E3DF;color:var(--text-primary)}
.nav-icon svg{pointer-events:none}
.nav-logo{width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.nav-divider{width:32px;height:1px;background:rgba(255,255,255,.15);margin:12px 0}
.nav-spacer{flex:1}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:#5B21B6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin:8px 0 4px}
.otto-panel{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg-otto-panel);overflow:hidden}
.otto-header{height:40px;background:var(--bg-card);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;border-bottom:1px solid var(--border-light)}
.otto-header-title{font-size:13px;font-weight:500;color:var(--text-primary);flex:1}
.otto-header-icon{color:var(--green-brand);display:flex;align-items:center}
.otto-header-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);border-radius:6px;cursor:pointer}
.otto-header-btn:hover{color:var(--text-secondary);background:var(--bg-page)}
.otto-steps-row{padding:6px 12px;display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--border-light);background:var(--bg-card)}
.otto-steps-label{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.otto-conversation{flex:1;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:16px;background:var(--bg-otto-panel)}
.otto-message{display:flex;flex-direction:column;gap:8px;animation:fadeInUp .15s ease-out}
.otto-message.user-message{align-items:flex-end}
.otto-message.user-message .otto-message-content{background:var(--green-brand);color:#fff;border-radius:12px 12px 4px 12px;padding:10px 14px;max-width:85%}
.otto-message-content{font-size:13px;color:var(--text-primary);line-height:1.6}
.otto-option{display:block;width:100%;background:#EBEBEA;border:1px solid var(--border-light);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:var(--text-primary);cursor:pointer;text-align:left;transition:background .12s;margin-top:4px}
.otto-option:hover{background:#E0DFDC}
.otto-option.selected{background:#E8F9EF;border-color:var(--green-brand);color:var(--green-text);pointer-events:none}
.otto-option:active{transform:scale(.98)}
.otto-cta-btn{background:#2D2D2B;color:#fff;border:none;border-radius:var(--radius-md);padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;display:inline-block}
.otto-cta-btn:hover{background:#3D3D3B}
.otto-input-bar{background:var(--bg-card);border-top:1px solid var(--border-light);padding:8px 12px;flex-shrink:0}
.otto-input-row{display:flex;align-items:center;gap:8px;background:var(--bg-otto-panel);border:1px solid var(--border-otto-input);border-radius:var(--radius-pill);padding:8px 10px 8px 14px}
.otto-input-field{flex:1;font-size:13px;color:var(--text-secondary);background:transparent;border:none;outline:none}
.otto-input-mic{width:32px;height:32px;border-radius:50%;background:var(--green-brand);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;flex-shrink:0}
.otto-input-mic:hover{background:var(--green-brand-dark)}
.otto-disclaimer{font-size:10px;color:var(--text-muted);text-align:center;margin-top:4px}
.otto-loading{display:flex;gap:4px;align-items:center;padding:4px 0}
.otto-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:ottoPulse 1.2s ease-in-out infinite}
.otto-dot:nth-child(2){animation-delay:.2s}
.otto-dot:nth-child(3){animation-delay:.4s}
.otto-info-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:12px;font-size:12px;margin-top:4px}
.otto-info-card-title{font-weight:600;font-size:13px;margin-bottom:8px;color:var(--text-primary)}
.otto-info-card-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--text-secondary)}
.otto-info-card-row span:last-child{color:var(--text-primary);font-weight:500}
.otto-filter-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:12px;margin-top:4px}
.otto-filter-title{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px}
.otto-filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.otto-filter-pill{background:var(--bg-page);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text-primary)}
.otto-source-input{background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:12px;margin-top:4px}
.otto-source-input label{font-size:12px;font-weight:500;color:var(--text-secondary);display:block;margin-bottom:6px}
.otto-source-input input{width:100%;border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;color:var(--text-primary);background:var(--bg-card)}
.otto-source-input input:focus{border-color:var(--green-brand);outline:none}
.otto-save-btn{background:#1B1B19;color:#fff;border:none;border-radius:var(--radius-md);padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;display:block;width:100%;text-align:center}
.otto-save-btn:hover{background:#2D2D2B}
.main-content{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column}
.main-content.otto-open{flex:0 0 68%}
.otto-panel-wrapper{display:none;position:relative;width:32%;min-width:340px;border-right:1px solid var(--border-light);background:var(--bg-otto-panel);z-index:1000;flex-shrink:0;height:100%}
.otto-panel-wrapper.open{display:flex;animation:fadeIn .2s ease-out}
@media(max-width:1100px){
  .main-content.otto-open{flex:1}
  .otto-panel-wrapper{position:fixed;right:16px;top:16px;bottom:56px;width:var(--otto-width);max-width:520px;min-width:320px;border-radius:var(--radius-lg);box-shadow:0 12px 40px rgba(0,0,0,.18);border:1px solid var(--border-light)}
}
.top-bar{height:40px;display:flex;align-items:center;padding:0 20px;gap:10px;background:var(--bg-card);border-bottom:1px solid var(--border-light);flex-shrink:0}
.top-bar-title{font-size:13px;font-weight:500;color:var(--text-primary)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
.breadcrumb-sep{color:var(--text-muted)}
.breadcrumb-active{color:var(--text-primary);font-weight:500}
.breadcrumb-link{cursor:pointer}
.breadcrumb-link:hover{color:var(--text-primary)}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--radius-pill)}
.status-pill.healthy,.status-pill.running{background:var(--green-running-bg);color:var(--green-text)}
.status-pill.attention{background:var(--amber-bg);color:var(--amber-text)}
.status-pill.error{background:var(--red-bg);color:var(--red-text)}
.status-pill.in-progress{background:#EFF6FF;color:#1D4ED8}
.status-pill.configured{background:#E8F9EF;color:var(--green-text)}
.status-pill.not-configured{background:#F1F5F9;color:#475569}
.status-pill.info{background:#EFF6FF;color:#1D4ED8}
.status-pill.active-status{background:var(--green-running-bg);color:var(--green-text)}
.status-pill.onboarding{background:#E8F9EF;color:var(--green-text)}
.status-pill.not-available{background:#F1F5F9;color:#64748B}
.status-pill.not-configured{background:#F1F5F9;color:#64748B}
.card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);box-shadow:var(--shadow-card)}
.card-clickable{cursor:pointer;transition:box-shadow .15s}
.card-clickable:hover{box-shadow:var(--shadow-card-lg)}
.toggle{width:40px;height:22px;border-radius:11px;background:#D1D5DB;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green-brand)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}
.progress-bar{width:80px;height:6px;background:#E5E3DF;border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--green-brand)}
.progress-bar-fill.in-progress{background:#1D4ED8;animation:progressPulse 2s ease-in-out infinite}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text-secondary);padding:8px 12px;border-bottom:1px solid var(--border-light);background:var(--bg-page)}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:13px;vertical-align:middle}
.data-table tr:hover td{background:#F7F6F3}
.new-row-highlight{animation:pulseHighlight 1.5s ease-out}
.demo-bar{position:fixed;bottom:0;left:0;right:0;min-height:40px;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;z-index:9999;padding:6px 20px}
.demo-bar-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);margin-right:8px}
.demo-bar-btn{font-size:11px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.25);border-radius:var(--radius-sm);padding:4px 12px;cursor:pointer;background:transparent;transition:all .15s}
.demo-bar-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.demo-bar-btn.active{background:var(--green-brand);border-color:var(--green-brand);color:#fff}
.demo-bar-btn.reset{border-color:rgba(255,100,100,.4);color:rgba(255,150,150,.9)}
.demo-bar-btn.reset:hover{background:rgba(255,50,50,.15)}
.page-content{padding:24px;padding-bottom:60px;flex:1}
.screen-enter{animation:fadeInUp .2s ease-out}
.ep-detail-screen{display:flex;flex-direction:column;height:100%}
.ep-detail-screen .page-content{flex:1;overflow:auto}
.ep-detail-screen .page-content.ep-review-page{display:flex;flex-direction:column;padding-bottom:0;overflow:hidden}
.ep-detail-screen .page-content.ep-review-page > .sp-layout{flex:1}
.landing-card{padding:24px;margin-bottom:12px}
.landing-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.landing-card-title-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.landing-card-subtitle{font-size:13px;color:var(--text-secondary);margin-top:4px}
.landing-health-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light)}
.landing-health-row:last-child{border-bottom:none}
.landing-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;grid-template-areas:"sys config" "sys external";gap:16px;align-items:stretch}
.landing-grid .landing-card{margin-bottom:0}
.landing-grid-sys{grid-area:sys}
.landing-grid-mid{grid-area:config}
.landing-grid-mid + .landing-grid-mid{grid-area:external}
.landing-banner{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);padding:28px 48px 28px 28px;margin-bottom:20px;position:relative;width:100%}
.landing-banner-close{position:absolute;top:18px;right:18px;color:var(--text-muted);cursor:pointer}
.landing-banner-close:hover{color:var(--text-primary)}
.landing-banner-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.landing-banner-title{font-size:24px;font-weight:600;color:var(--text-primary)}
.landing-banner-desc{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:18px}
.landing-step-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.landing-step-pill{display:flex;align-items:center;gap:6px;background:var(--bg-tag-gray);border:1px solid var(--border-light);border-radius:var(--radius-pill);padding:6px 14px;font-size:12px;color:var(--text-primary);font-weight:500}
.landing-step-pill.done{background:#E8F9EF;color:var(--green-text);border-color:var(--green-brand)}
.landing-step-pill.done::before{content:'✓';display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--green-brand);color:#fff;font-size:10px}
.landing-step-pill.pending::before{content:'';display:inline-flex;width:8px;height:8px;border-radius:50%;background:var(--text-muted);margin-right:2px}
.landing-banner-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.landing-banner-btn{border-radius:var(--radius-md);padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer}
.landing-banner-btn.primary{background:#1B1B19;color:#fff}
.landing-banner-btn.primary:hover{background:#2D2D2B}
.landing-banner-btn.ai{background:var(--green-brand);color:#fff;display:flex;align-items:center;gap:6px}
.landing-banner-btn.ai:hover{background:var(--green-brand-dark)}
.landing-banner-btn.ghost{background:var(--bg-tag-gray);color:var(--text-primary);border:1px solid var(--border-light)}
.landing-resources-horizontal{margin-top:32px;display:flex;justify-content:center}
.landing-resource-list{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}
.landing-resource-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary);cursor:pointer}
.landing-resource-item:hover{color:var(--text-primary)}
.landing-resource-icon{width:28px;height:28px;border-radius:6px;background:var(--bg-tag-gray);display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.app-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.app-card{padding:20px;cursor:pointer;border-radius:var(--radius-lg)}
.app-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.app-card-icon{width:44px;height:44px;border-radius:var(--radius-md);border:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.app-card-icon svg{width:24px;height:24px}
.app-card-status{display:flex;align-items:center;gap:8px}
.app-card-name{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:12px}
.app-card-meta-row{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
.app-card-meta-row svg{color:var(--text-muted)}
.ep-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.ep-title{font-size:24px;font-weight:600;color:var(--text-primary)}
.ep-modified{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.ep-open-btn{font-size:12px;color:var(--text-primary);border:1px solid var(--border-medium);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:4px;background:var(--bg-card)}
.ep-open-btn:hover{background:var(--bg-page)}
.ep-tabs{display:flex;gap:0;border-bottom:1px solid var(--border-light);margin-bottom:20px}
.ep-tab{padding:10px 16px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ep-tab:hover{color:var(--text-primary)}
.ep-tab.active{color:var(--text-primary);font-weight:500;border-bottom-color:var(--text-primary)}
.ep-sources-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.ep-sources-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.ep-sources-count{background:var(--bg-page);border-radius:var(--radius-pill);padding:1px 8px;font-size:11px;font-weight:500;color:var(--text-secondary)}
.ep-sources-actions{display:flex;align-items:center;gap:12px}
.ep-add-source-btn{background:#1B1B19;color:#fff;border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer}
.ep-add-source-btn:hover{background:#2D2D2B}
.ep-sources-desc{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.ep-pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:12px;color:var(--text-secondary)}
.edit-interface-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.edit-interface-card{padding:20px}
.edit-interface-tabs{display:flex;gap:16px;border-bottom:1px solid var(--border-light);margin:-20px -20px 16px -20px;padding:0 20px}
.edit-interface-tab{padding:12px 0;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent}
.edit-interface-tab.active{color:var(--text-primary);font-weight:500;border-bottom-color:var(--text-primary)}
.edit-filter-list{padding-bottom:8px}
.edit-filter-header{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;padding:0 0 8px 0}
.edit-filter-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-light)}
.edit-filter-item:last-child{border-bottom:none}
.edit-add-filter-btn{margin-top:16px;background:#1B1B19;color:#fff;border-radius:var(--radius-md);padding:8px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;cursor:pointer;border:none}
.edit-add-filter-btn:hover{background:#2D2D2B}
.edit-template-table{padding-bottom:8px}
.edit-template-header{display:grid;grid-template-columns:1.2fr 1fr 1fr 80px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;padding:0 0 10px 0}
.edit-template-row{display:grid;grid-template-columns:1.2fr 1fr 1fr 80px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light);font-size:13px;color:var(--text-primary)}
.edit-template-row:last-child{border-bottom:none}
.edit-template-applies{font-size:12px;color:var(--blue)}
.edit-template-cond{font-size:12px;color:var(--text-primary);background:var(--bg-tag-gray);border-radius:var(--radius-pill);padding:3px 8px;width:fit-content}
.edit-preview-card{padding:20px}
.edit-preview-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.edit-preview-tab{font-size:11px;padding:5px 10px;border-radius:var(--radius-pill);color:var(--text-secondary);background:var(--bg-tag-gray);cursor:pointer}

const init={currentScreen:SCREENS.LANDING,ottoOpen:false,cs:null,scenario:null,srcAdded:false,valDone:false,warnOff:false,sel:{},hTab:'Overview',epTab:'Sources',epBanner:true,srcName:'Employee Portal Knowledge',refOpen:true,whyOpen:false,selApp:'employee-portal',ottoInput:'',uc1Src:null,ottoApp:'',ottoIssue:'',ottoQuery:'',p1Sources:escSrcs,p1SrcAdded:false,p1RcBannerOff:false,p1ValFixed:false,p1ValQuery:''};
function red(s,a){
  switch(a.type){
    case 'SCR':return{...s,currentScreen:a.v};
    case 'SEL_APP':return{...s,selApp:a.v};
    case 'TOG_O':return{...s,ottoOpen:!s.ottoOpen};
    case 'SET_O':return{...s,ottoOpen:a.v};
    case 'SET_CS':return{...s,cs:a.v};
    case 'SCEN':return{...s,scenario:a.v,cs:a.cs,ottoOpen:true,sel:{},ottoApp:'',ottoIssue:'',ottoQuery:'',ottoInput:'',uc1Src:null,p1Sources:escSrcs,p1SrcAdded:false,p1RcBannerOff:false,p1ValFixed:false,p1ValQuery:''};
    case 'SEL':return{...s,sel:{...s.sel,[a.step]:a.opt}};
    case 'SRC_ADD':return{...s,srcAdded:true};
    case 'VAL':return{...s,valDone:true};
    case 'WARN':return{...s,warnOff:true};
    case 'H_TAB':return{...s,hTab:a.v};
    case 'EP_TAB':return{...s,epTab:a.v};
    case 'FOCUS_RC':return{...s,epTab:'Interface'};
    case 'EP_BAN':return{...s,epBanner:false};
    case 'P1_RC_BANNER_OFF':return{...s,p1RcBannerOff:true};
    case 'SRC_NM':return{...s,srcName:a.v};
    case 'REF':return{...s,refOpen:a.v};
    case 'WHY':return{...s,whyOpen:a.v};
    case 'SET_OI':return{...s,ottoInput:a.v};
    case 'SUB_OI':
      if(s.cs==='P1_TABLE')return{...s,cs:'P1_FILTER',ottoInput:'',uc1Src:{name:'Catalog Items',rawName:s.ottoInput||'Catalog items',table:'sc_cat_item',filter:'Active = true',searchMode:'Hybrid',linkedTo:'Employee Center'}};
      if(s.cs==='P2_QUERY')return{...s,cs:'P2_DIAGNOSE',ottoQuery:s.ottoInput||'Reset my password',ottoInput:''};
      return s;
    case 'P1_SRC_ADD':return{...s,p1SrcAdded:true,uc1Src:{name:'Catalog Items'},p1Sources:[...s.p1Sources,{name:'Catalog Items',table:'sc_cat_item',documents:null,documentsPerSecond:1240,keyword:'Indexed',semantic:'In Progress',semanticEta:'~30 min',otto:true}]};
    case 'P1_RC_COMPLETE':return{...s,p1Sources:s.p1Sources.map(src=>src.name==='Catalog Items'?{...src,documents:4218,documentsPerSecond:null,semantic:'Indexed',semanticEta:null}:src)};
    case 'SET_P1VQ':return{...s,p1ValQuery:a.v};
    case 'P1_VAL_SEARCH':{
      const q=(a.v||'').trim();
      if(!q)return s;
      return{...s,p1ValQuery:q,cs:s.p1ValFixed?'P1_VAL_RESULTS_FOUND':'P1_VAL_NORESULTS'};
    }
    case 'P1_VAL_FIX':return{...s,p1ValFixed:true,p1ValQuery:''};
    case 'UC1_RC':return{...s,cs:'UC1_RESULT_CARD',epTab:'Interface'};
    case 'RESET':return{...init};
    default:return s;
  }
}

/* Otto Panel */
const Otto=({state:s,d})=>{
  const ref=useRef(null);
  useEffect(()=>{if(ref.current)setTimeout(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},60);},[s.cs]);
  useEffect(()=>{
    let t;
    if(s.cs==='S1_CHECKING')t=setTimeout(()=>d({type:'SET_CS',v:'S1_FOUND'}),1500);
    else if(s.cs==='S1_SAVING')t=setTimeout(()=>{d({type:'SRC_ADD'});d({type:'SET_CS',v:'S1_INDEXING'});},1500);
    else if(s.cs==='S2_PREVIEW_OPEN')t=setTimeout(()=>d({type:'SET_CS',v:'S2_RESULTS'}),2000);
    else if(s.cs==='S3_PREVIEW_OPEN')t=setTimeout(()=>d({type:'SET_CS',v:'S3_RESULTS'}),1000);
    else if(s.cs==='S2_VALIDATED')t=setTimeout(()=>{d({type:'VAL'});d({type:'WARN'});},1000);
    return()=>clearTimeout(t);
  },[s.cs]);

  const pk=(step,label,next,extra)=>{d({type:'SEL',step,opt:label});if(extra)extra();d({type:'SET_CS',v:next});};
  const OB=({st,lb,nx,ex})=>{const sel=s.sel[st];const isCurrent=s.cs===st;const isSelected=sel===lb;const dis=sel&&!isSelected;if(!isCurrent&&!isSelected)return null;return<button className={`otto-option ${isSelected?'selected':''}`} style={dis?{opacity:.5,pointerEvents:'none'}:{}} onClick={()=>pk(st,lb,nx,ex)}>{lb}</button>;};

  const steps=s.scenario===1?['S1_INTRO','S1_CHECKING','S1_FOUND','S1_NAME','S1_ATTACHMENTS','S1_MULTILINGUAL','S1_FILTERS','S1_HYBRID','S1_REVIEW','S1_SAVING','S1_INDEXING']:s.scenario===2?['S2_INTRO','S2_HEALTH_OVERVIEW','S2_CONFIG_HEALTH','S2_PREVIEW_OPEN','S2_RESULTS','S2_RESULTS_ACL','S2_VALIDATED','S2_DONE']:s.scenario===3?['S3_INTRO','S3_PREVIEW_OPEN','S3_RESULTS','S3_TROUBLESHOOT','S3_COMPLETE']:s.scenario===4?['UC1_GREET','UC1_TABLE','UC1_FILTER','UC1_HYBRID','UC1_SUMMARY','UC1_DONE','UC1_RESULT_CARD']:s.scenario===5?['OP_GREET','P1_APP','P1_CONTENT','P1_FILTER','P1_HYBRID','P1_SUMMARY','P1_DONE','P1_RESULT_CARD','P1_RC_NEXT','P1_VAL_NEXT','P1_VAL_PROMPT','P1_VAL_NORESULTS','P1_VAL_FIX_RETURN','P1_VAL_RESULTS_FOUND','P1_VAL_DONE','P1_VAL_FINAL','P2_APP','P2_ISSUE','P2_QUERY','P2_DIAGNOSE','P2_FILTER','P2_OPEN_SOURCE','P3_CHECK','P3_MISCONFIG','P3_FIX_FIRST','P3_ERROR_DETAIL','P3_OPEN_ERROR','P3_SAVED','P3_WARNING','P3_OPEN_SOURCE']:[];

  const renderStep=(id)=>{
    switch(id){
      case 'S1_INTRO':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I see you are in Employee Portal. You have 2 sources configured: SharePoint and Service Catalog. How can I help?</div><OB st="S1_INTRO" lb="Add a knowledge source" nx="S1_CHECKING"/><OB st="S1_INTRO" lb="Check my configuration" nx="S1_CHECKING"/><OB st="S1_INTRO" lb="Ask a question" nx="S1_CHECKING"/></>;
      case 'S1_CHECKING':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I will add a knowledge source to Employee Portal. Let me check if the knowledge table is already indexed on your instance.</div><OL/></>;
      case 'S1_FOUND':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> The knowledge table is already indexed by another application. You can reuse the existing index source — this avoids duplication and will not trigger a full reindex. Here are the current settings.</div><div className="otto-info-card"><div className="otto-info-card-title">kb_knowledge</div><div className="otto-info-card-row"><span>Keyword indexing</span><span>Indexed</span></div><div className="otto-info-card-row"><span>Semantic indexing</span><span>Indexed</span></div><div className="otto-info-card-row"><span>Documents</span><span>18,432</span></div></div><OB st="S1_FOUND" lb="Reuse existing source" nx="S1_NAME"/><OB st="S1_FOUND" lb="Create a new source" nx="S1_NAME"/></>;
      case 'S1_NAME':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have pre-filled the settings from the existing source. Let me walk you through each option. First, what should we call this source?</div><div className="otto-source-input"><label>Source name</label><input value={s.srcName} onChange={e=>d({type:'SRC_NM',v:e.target.value})}/></div><OB st="S1_NAME" lb="Use this name" nx="S1_ATTACHMENTS"/></>;
      case 'S1_ATTACHMENTS':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Should this source include attachments? Attachments such as PDFs and documents attached to knowledge articles will be indexed and searchable.</div><OB st="S1_ATTACHMENTS" lb="Yes, include attachments" nx="S1_MULTILINGUAL"/><OB st="S1_ATTACHMENTS" lb="No, skip attachments" nx="S1_MULTILINGUAL"/></>;
      case 'S1_MULTILINGUAL':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Does this application need to support multiple languages? I detected that your instance has content in English only, so this is not required right now.</div><OB st="S1_MULTILINGUAL" lb="No, English only" nx="S1_FILTERS"/><OB st="S1_MULTILINGUAL" lb="Yes, enable multilingual support" nx="S1_FILTERS"/></>;
      case 'S1_FILTERS':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Here are the filter conditions from the existing source. These filter for active records only, which keeps your index lean and relevant.</div><div className="otto-filter-card"><div className="otto-filter-title">Filter conditions</div><div className="otto-filter-pills"><span className="otto-filter-pill">active</span><span className="otto-filter-pill">is</span><span className="otto-filter-pill">true</span></div></div><OB st="S1_FILTERS" lb="Keep these filters" nx="S1_HYBRID"/><OB st="S1_FILTERS" lb="Edit filters" nx="S1_HYBRID"/></>;
      case 'S1_HYBRID':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Hybrid search is recommended for the knowledge table. Knowledge articles contain rich content, so combining keyword and semantic search returns more accurate results for natural language queries. Would you like to enable it?</div><OB st="S1_HYBRID" lb="Yes, enable hybrid search" nx="S1_REVIEW"/><OB st="S1_HYBRID" lb="No, keyword only" nx="S1_REVIEW"/></>;
      case 'S1_REVIEW':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Here is a summary of your new knowledge source. Everything looks good. Ready to save?</div><div className="otto-info-card"><div className="otto-info-card-title">{s.srcName}</div><div className="otto-info-card-row"><span>Table</span><span>kb_knowledge</span></div><div className="otto-info-card-row"><span>Include attachments</span><span>Yes</span></div><div className="otto-info-card-row"><span>Multiple languages</span><span>No</span></div><div className="otto-info-card-row"><span>Search mode</span><span>Hybrid</span></div><div className="otto-info-card-row"><span>Data retention</span><span>2 years</span></div><div className="otto-info-card-row"><span>Filter conditions</span><span>active is true</span></div><div className="otto-info-card-row"><span>Title field</span><span>short_description</span></div><div className="otto-info-card-row"><span>Body field</span><span>text</span></div><div className="otto-info-card-row"><span>Sort by</span><span>sys_updated_on</span></div></div><button className="otto-save-btn" style={s.sel['S1_REVIEW']?{opacity:.6,pointerEvents:'none'}:{}} onClick={()=>pk('S1_REVIEW','Save','S1_SAVING')}>Save</button>{!s.sel['S1_REVIEW']&&<OB st="S1_REVIEW" lb="Go back and edit" nx="S1_NAME"/>}</>;
      case 'S1_SAVING':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Saving...</div><OL/></>;
      case 'S1_INDEXING':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your knowledge source has been added and indexing has started. This table has 18,432 documents — indexing will take approximately 2 hours. You will see progress in the Sources tab.</div><div className="otto-message-content" style={{marginTop:4}}>In the meantime, I recommend reviewing the result card configuration to make sure the right fields appear in search results. Would you like me to take you there?</div><OB st="S1_INDEXING" lb="Yes, review the search interface" nx="S1_INDEXING" ex={()=>d({type:'SCR',v:SCREENS.SEARCH_PREVIEW})}/><OB st="S1_INDEXING" lb="I will do that later" nx="S1_INDEXING"/></>;
      case 'S2_INTRO':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Good morning, {DATA.user.name}. I found issues in your instance that need attention. Configuration Health shows 3 errors and 5 warnings. One issue may be affecting search results in Employee Portal. Would you like me to guide you through it?</div><OB st="S2_INTRO" lb="Yes, show me" nx="S2_HEALTH_OVERVIEW" ex={()=>d({type:'SCR',v:SCREENS.SYSTEM_HEALTH})}/><OB st="S2_INTRO" lb="Maybe later" nx="S2_INTRO"/></>;
      case 'S2_HEALTH_OVERVIEW':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Here is the current state of your system. Configuration Health has 3 errors and 5 warnings. Let me start with the most important one.</div><div className="otto-message-content" style={{marginTop:4}}>A knowledge source in Employee Portal has not been validated since it was added. Results from this source have not been confirmed as accurate. Would you like to validate it now?</div><OB st="S2_HEALTH_OVERVIEW" lb="Yes, validate now" nx="S2_PREVIEW_OPEN" ex={()=>d({type:'SCR',v:SCREENS.SEARCH_PREVIEW})}/><OB st="S2_HEALTH_OVERVIEW" lb="Show me all issues first" nx="S2_CONFIG_HEALTH" ex={()=>d({type:'H_TAB',v:'Configuration Health'})}/></>;
      case 'S2_CONFIG_HEALTH':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Here are your current issues. The most impactful one is the unvalidated source in Employee Portal. I recommend starting there. Ready to validate?</div><OB st="S2_CONFIG_HEALTH" lb="Yes, validate now" nx="S2_PREVIEW_OPEN" ex={()=>d({type:'SCR',v:SCREENS.SEARCH_PREVIEW})}/></>;
      case 'S2_PREVIEW_OPEN':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened a search preview scoped to Employee Portal. Try a query that your employees would typically search for. For example: try "parental leave policy" or "expense reimbursement."</div><OL/></>;
      case 'S2_RESULTS':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> These results look reasonable. The top result is "Employee Portal Access Guide" — it ranked first based on the title match and hybrid scoring. Before marking this source as validated, confirm two things:</div><div className="otto-message-content" style={{marginTop:4}}>1. The right content is appearing in results.<br/>2. The users who should see these results have the correct access.</div><OB st="S2_RESULTS" lb="Yes, access is confirmed — results look good" nx="S2_VALIDATED"/><OB st="S2_RESULTS" lb="I need to check access first" nx="S2_RESULTS_ACL"/></>;
      case 'S2_RESULTS_ACL':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> You can check ACLs in the Security {'>'} Access Control module. Come back when you are ready.</div><OB st="S2_RESULTS_ACL" lb="Yes, access is confirmed — results look good" nx="S2_VALIDATED"/></>;
      case 'S2_VALIDATED':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> This source is now validated. I am dismissing the warning from Configuration Health.</div><div className="otto-message-content" style={{marginTop:8}}><SI size={12} color="var(--green-brand)"/> One issue resolved. There are 2 more errors remaining. Would you like to continue?</div><OB st="S2_VALIDATED" lb="Yes, continue" nx="S2_DONE"/><OB st="S2_VALIDATED" lb="I will handle the rest later" nx="S2_DONE"/></>;
      case 'S2_DONE':return<div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Sounds good. I am here if you need anything.</div>;
      case 'S3_INTRO':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your knowledge source has finished indexing and is ready. Would you like to validate that it is returning the right results?</div><OB st="S3_INTRO" lb="Yes, validate" nx="S3_PREVIEW_OPEN" ex={()=>d({type:'SCR',v:SCREENS.SEARCH_PREVIEW})}/><OB st="S3_INTRO" lb="Not now" nx="S3_INTRO"/></>;
      case 'S3_PREVIEW_OPEN':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened a preview scoped to your new Employee Portal knowledge source. Try a query your employees would search for. Something like: "flexible working policy" or "parental leave."</div><OL/></>;
      case 'S3_RESULTS':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I found 20 results. The top result is "Flexible Work Arrangement Guide" — it is ranked first based on the short description and body fields you configured during setup. Does this look right?</div><OB st="S3_RESULTS" lb="Yes, this looks correct" nx="S3_COMPLETE"/><OB st="S3_RESULTS" lb="Something looks wrong" nx="S3_TROUBLESHOOT"/></>;
      case 'S3_TROUBLESHOOT':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Let me help you diagnose. The most common cause for unexpected results is the body field pulling from the wrong column. Your current body field is set to "text." Would you like me to update that field?</div><OB st="S3_TROUBLESHOOT" lb="Yes, update the body field" nx="S3_COMPLETE"/><OB st="S3_TROUBLESHOOT" lb="No, the results are actually fine" nx="S3_COMPLETE"/></>;
      case 'S3_COMPLETE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your knowledge source is live in Employee Portal. Setup is complete. Admins and employees can now find knowledge articles through search.</div><div style={{marginTop:8,animation:'fadeIn .5s ease-out'}}><CCI size={24} color="var(--green-brand)"/></div></>;
      case 'OP_GREET':{
        const isCurrent=s.cs==='OP_GREET';
        const selected=s.cs.startsWith('P1')?'Set up or add a new source':s.cs.startsWith('P2')?'My search results are not working':s.cs.startsWith('P3')?'Check my system health':null;
        return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Hi Richa. I am Otto, your AI Search assistant.</div><div className="otto-message-content">I can help you set up and configure search, troubleshoot issues, and keep your system healthy.</div><div className="otto-message-content">What would you like to do today?</div>{isCurrent?<><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P1_APP'});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}>Set up or add a new source</button><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P2_APP'});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}>My search results are not working</button><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P3_CHECK'});d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});}}>Check my system health</button></>:selected&&<button className="otto-option selected" style={{pointerEvents:'none'}}>{selected}</button>}</>;
      }
      case 'P1_APP':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Which application do you want to configure search for?</div><OB st="P1_APP" lb="Employee Service Center" nx="P1_CONTENT" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'employee-service-center'});d({type:'EP_TAB',v:'Sources'});}}/><OB st="P1_APP" lb="IT Self-Service Portal" nx="P1_CONTENT" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'it-self-service'});d({type:'EP_TAB',v:'Sources'});}}/><OB st="P1_APP" lb="HR Portal" nx="P1_CONTENT" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'hr-hub'});d({type:'EP_TAB',v:'Sources'});}}/><OB st="P1_APP" lb="Other" nx="P1_CONTENT" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'employee-service-center'});d({type:'EP_TAB',v:'Sources'});}}/></>;
      case 'P1_CONTENT':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> What do you want to make searchable in {s.sel['P1_APP']||'Employee Service Center'}?</div><OB st="P1_CONTENT" lb="Catalog items" nx="P1_FILTER"/><OB st="P1_CONTENT" lb="Knowledge articles" nx="P1_FILTER"/><OB st="P1_CONTENT" lb="Something else" nx="P1_FILTER"/></>;
      case 'P1_FILTER':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Got it. I checked the backend. The catalog items table has not been indexed on your instance yet, so I will create a new source from scratch.<br/>Do you want to include all active catalog items, or filter to a specific category?</div><OB st="P1_FILTER" lb="All active items" nx="P1_HYBRID"/><OB st="P1_FILTER" lb="Let me set a filter" nx="P1_HYBRID"/></>;
      case 'P1_HYBRID':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your instance has Now Assist. I can enable and add the source for hybrid search. It works better for natural language queries, and catalog items are a good candidate for us to include it in hybrid.</div><OB st="P1_HYBRID" lb="Enable hybrid search" nx="P1_SUMMARY"/><OB st="P1_HYBRID" lb="Keep keyword only" nx="P1_SUMMARY"/></>;
      case 'P1_SUMMARY':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Here is what I am about to set up:</div><div className="otto-info-card"><div className="otto-info-card-title">Catalog Items</div><div className="otto-info-card-row"><span>Source</span><span>Catalog Items</span></div><div className="otto-info-card-row"><span>Table</span><span>sc_cat_item</span></div><div className="otto-info-card-row"><span>Filter</span><span>Active = true</span></div><div className="otto-info-card-row"><span>Search mode</span><span>Hybrid</span></div><div className="otto-info-card-row"><span>Linked to</span><span>Employee Service Center</span></div></div><OB st="P1_SUMMARY" lb="Confirm and start indexing" nx="P1_DONE" ex={()=>d({type:'P1_SRC_ADD'})}/><OB st="P1_SUMMARY" lb="Change something" nx="P1_APP"/></>;
      case 'P1_DONE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Done. Indexing has started.<br/>While you wait, I recommend checking your result card so search results display correctly the moment indexing finishes.</div><OB st="P1_DONE" lb="Set up my result card now" nx="P1_RESULT_CARD" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'employee-service-center'});d({type:'FOCUS_RC'});d({type:'SET_O',v:true});}}/><OB st="P1_DONE" lb="I will do this later" nx="P1_RESULT_CARD"/></>;
      case 'P1_RESULT_CARD':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened the result card configuration screen for <strong>Catalog Items</strong> inside the Employee Service Center tab.</div><OB st="P1_RESULT_CARD" lb="This looks good" nx="P1_RC_NEXT" ex={()=>{d({type:'EP_TAB',v:'Sources'});d({type:'P1_RC_COMPLETE'});}}/><OB st="P1_RESULT_CARD" lb="I need help editing" nx="P1_RC_NEXT"/></>;
      case 'P1_RC_NEXT':return s.sel['P1_RESULT_CARD']==='I need help editing'?<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> No problem. Click any field's pill in the result card to change what data it maps to, or use "Add field" to include another field.</div></>:<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> It looks like your indexing has also completed for Catalog Items. Your source is ready.<br/>Want to run a quick check to make sure the right results are showing up for your users?</div><OB st="P1_RC_NEXT" lb="Yes, let's validate" nx="P1_VAL_NEXT" ex={()=>d({type:'SCR',v:SCREENS.SEARCH_PREVIEW})}/><OB st="P1_RC_NEXT" lb="I will do this later" nx="P1_VAL_NEXT"/></>;
      case 'P1_VAL_NEXT':return s.sel['P1_RC_NEXT']==='I will do this later'?<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> No problem, I am here whenever you are ready.</div></>:<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Let us make sure your users can find catalog items. I will walk you through this step by step.<br/>First things first. Do you have the catalog admin or search admin role on this instance?</div><OB st="P1_VAL_NEXT" lb="Yes, I have the right roles" nx="P1_VAL_PROMPT"/><OB st="P1_VAL_NEXT" lb="I am not sure" nx="P1_VAL_PROMPT"/></>;
      case 'P1_VAL_PROMPT':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> {s.sel['P1_VAL_NEXT']==='I am not sure'?'No problem — as long as you can access this configuration screen, you should be able to preview results too.':'Good. That means you should be able to see results in preview.'} Go ahead and type a search query in the preview panel on the right. Try something a user would actually request, like "New laptop" or "requesting a new laptop."</div>{s.cs==='P1_VAL_PROMPT'&&<button className="otto-option" onClick={()=>d({type:'P1_VAL_SEARCH',v:'New laptop'})}>Try "New laptop"</button>}</>;
      case 'P1_VAL_NORESULTS':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> No results for "{s.p1ValQuery}." Let me check your configuration.</div><div className="otto-message-content" style={{marginTop:4}}><ol style={{margin:0,paddingLeft:18,display:'flex',flexDirection:'column',gap:8}}><li>Your current filter condition for this source is <strong>Active = true</strong>. That looks fine.</li><li>But I can also see that the catalog item <strong>"Request New Laptop"</strong> on your instance currently has Active set to false. That item is excluded from your index because of that.</li><li>This is likely why nothing is showing up. You will need to go into the catalog item record and set it back to active, then come back here and try again.</li></ol></div><OB st="P1_VAL_NORESULTS" lb="Take me to the record" nx="P1_VAL_FIX_RETURN" ex={()=>d({type:'P1_VAL_FIX'})}/><OB st="P1_VAL_NORESULTS" lb="I will fix it myself" nx="P1_VAL_FIX_RETURN" ex={()=>d({type:'P1_VAL_FIX'})}/></>;
      case 'P1_VAL_FIX_RETURN':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Welcome back. Try the same search again in the preview panel and let us see if that fixed it.</div>{s.cs==='P1_VAL_FIX_RETURN'&&<button className="otto-option" onClick={()=>d({type:'P1_VAL_SEARCH',v:'New laptop'})}>Try "New laptop" again</button>}</>;
      case 'P1_VAL_RESULTS_FOUND':return<OB st="P1_VAL_RESULTS_FOUND" lb="Yes, it is showing now" nx="P1_VAL_DONE"/>;
      case 'P1_VAL_DONE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> That is it. The item was inactive, which excluded it from the index entirely. Setting it back to active made it available in search.<br/>Your catalog source is ready for Employee Center.</div><OB st="P1_VAL_DONE" lb="Check another item" nx="P1_VAL_FINAL" ex={()=>d({type:'SET_P1VQ',v:''})}/><OB st="P1_VAL_DONE" lb="Look at my result card" nx="P1_VAL_FINAL" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'EP_TAB',v:'Interface'});}}/><OB st="P1_VAL_DONE" lb="I am done" nx="P1_VAL_FINAL" ex={()=>{d({type:'SCR',v:SCREENS.LANDING});d({type:'SET_O',v:false});}}/></>;
      case 'P1_VAL_FINAL':{
        const c=s.sel['P1_VAL_DONE'];
        const msg=c==='Check another item'?'Sure — go ahead and type another query in the preview panel.':c==='Look at my result card'?'Here is your result card configuration for Catalog Items.':'Great, glad I could help. Let me know if you need anything else.';
        return<div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> {msg}</div>;
      }
      case 'P2_APP':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Which application is the issue in?</div><OB st="P2_APP" lb="Employee Center" nx="P2_ISSUE"/><OB st="P2_APP" lb="IT Self-Service Portal" nx="P2_ISSUE"/><OB st="P2_APP" lb="HR Portal" nx="P2_ISSUE"/><OB st="P2_APP" lb="Other" nx="P2_ISSUE"/></>;
      case 'P2_ISSUE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> What is happening?</div><OB st="P2_ISSUE" lb="I am not seeing any results" nx="P2_QUERY"/><OB st="P2_ISSUE" lb="Results look wrong or incomplete" nx="P2_QUERY"/><OB st="P2_ISSUE" lb="Results are showing for the wrong content" nx="P2_QUERY"/></>;
      case 'P2_QUERY':return id===s.cs?<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> What did you search for?</div><div className="otto-source-input"><label>Search query</label><input value={s.ottoInput} onChange={e=>d({type:'SET_OI',v:e.target.value})} placeholder="Type your search and press Enter"/></div></>:<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> What did you search for?</div></>;
      case 'P2_DIAGNOSE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your knowledge base source finished indexing 3 days ago, so content should be available.<br/>The most common reasons results do not appear after a successful index are:</div><OB st="P2_DIAGNOSE" lb="Filter conditions are too restrictive" nx="P2_FILTER"/><OB st="P2_DIAGNOSE" lb="Body field is mapped incorrectly" nx="P2_FILTER"/><OB st="P2_DIAGNOSE" lb="Source is not linked to this application" nx="P2_FILTER"/></>;
      case 'P2_FILTER':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Your current filter for this source is <strong>Active = true</strong>.<br/>For the Knowledge table, articles are controlled by <strong>workflow_state = published</strong>, not the active flag. Active records can still be in draft or retired state.<br/>Adding <strong>workflow_state = published</strong> will fix this. And because you are narrowing the filter, no reindexing is needed.</div><OB st="P2_FILTER" lb="Open filter conditions" nx="P2_OPEN_SOURCE" ex={()=>{d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});d({type:'SEL_APP',v:'it-self-service'});d({type:'EP_TAB',v:'Sources'});d({type:'SET_O',v:true});}}/><OB st="P2_FILTER" lb="Tell me more about this" nx="P2_OPEN_SOURCE"/></>;
      case 'P2_OPEN_SOURCE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened the source settings for the knowledge source inside the IT Self-Service Portal tab.</div></>;
      case 'P3_CHECK':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> What do you want to check?</div><OB st="P3_CHECK" lb="See if there are any misconfigurations" nx="P3_MISCONFIG"/><OB st="P3_CHECK" lb="Check indexing status" nx="P3_MISCONFIG"/><OB st="P3_CHECK" lb="See if AI Search is installed and running" nx="P3_MISCONFIG"/></>;
      case 'P3_MISCONFIG':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I can see one error and one warning on your instance right now.<br/>Errors must be resolved. Warnings can be dismissed if you are aware of them.</div><OB st="P3_MISCONFIG" lb="Walk me through the error" nx="P3_ERROR_DETAIL"/><OB st="P3_MISCONFIG" lb="Tell me about the warning" nx="P3_WARNING"/><OB st="P3_MISCONFIG" lb="What should I fix first" nx="P3_FIX_FIRST"/></>;
      case 'P3_FIX_FIRST':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Start with the error.<br/>The issue: A search profile is shared across Employee Center and HR Portal. Changes made for one application will affect the other.<br/>The fix is to remove the incorrect association so each application has its own profile.</div><OB st="P3_FIX_FIRST" lb="Take me there" nx="P3_OPEN_ERROR" ex={()=>{d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});d({type:'H_TAB',v:'Configuration Health'});d({type:'SET_O',v:true});}}/><OB st="P3_FIX_FIRST" lb="Explain this more" nx="P3_OPEN_ERROR"/></>;
      case 'P3_ERROR_DETAIL':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> The error: A search profile is shared across Employee Center and HR Portal. Changes made for one application will affect the other.<br/>The fix is to remove the incorrect association so each application has its own profile.</div><OB st="P3_ERROR_DETAIL" lb="Take me there" nx="P3_OPEN_ERROR" ex={()=>{d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});d({type:'H_TAB',v:'Configuration Health'});d({type:'SET_O',v:true});}}/><OB st="P3_ERROR_DETAIL" lb="Explain this more" nx="P3_OPEN_ERROR"/></>;
      case 'P3_OPEN_ERROR':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened the relevant configuration screen. The System Health tab stays open in the tab bar.</div><OB st="P3_OPEN_ERROR" lb="Save changes" nx="P3_SAVED"/></>;
      case 'P3_SAVED':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Saved. Running a quick scan on the affected configuration now.<br/>(Scan completes)<br/>The error is resolved and has been removed from Configuration Health.<br/>You still have one warning open.</div><OB st="P3_SAVED" lb="Show me the warning" nx="P3_WARNING"/><OB st="P3_SAVED" lb="I am done for now" nx="P3_WARNING"/></>;
      case 'P3_WARNING':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> The warning: The HR Policies source has not been reindexed in 47 days. Content may be stale.<br/>This is a warning, not an error. You can dismiss it or take action.</div><OB st="P3_WARNING" lb="Take me to the source" nx="P3_OPEN_SOURCE" ex={()=>{d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});d({type:'H_TAB',v:'Indexing Status'});d({type:'SET_O',v:true});}}/><OB st="P3_WARNING" lb="Dismiss the warning" nx="P3_OPEN_SOURCE"/></>;
      case 'P3_OPEN_SOURCE':return<><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> I have opened the HR Policies source detail inside Indexing Status. You can review the indexing history and trigger a reindex manually.</div></>;
      default:return null;
    }
  };

  const renderConv=()=>{
    if(!s.scenario&&!s.cs)return<div className="otto-message"><div className="otto-message-content"><SI size={12} color="var(--green-brand)"/> Hi Richa. I am Otto, your AI Search assistant.</div><div className="otto-message-content">I can help you set up and configure search, troubleshoot issues, and keep your system healthy.</div><div className="otto-message-content">What would you like to do today?</div><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P1_APP'});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}>Set up or add a new source</button><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P2_APP'});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}>My search results are not working</button><button className="otto-option" onClick={()=>{d({type:'SCEN',v:5,cs:'P3_CHECK'});d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});}}>Check my system health</button></div>;
    const ci=steps.indexOf(s.cs);
    const els=[];
    for(let i=0;i<=ci&&i<steps.length;i++){
      els.push(<div key={steps[i]} className="otto-message">{renderStep(steps[i])}</div>);
      if(steps[i]==='P2_QUERY'&&s.ottoQuery)els.push(<div key="user-p2" className="otto-message user-message"><div className="otto-message-content">{s.ottoQuery}</div></div>);
      if(steps[i]==='P1_VAL_PROMPT'&&s.p1ValQuery)els.push(<div key="user-p1val1" className="otto-message user-message"><div className="otto-message-content">{s.p1ValQuery}</div></div>);
      if(steps[i]==='P1_VAL_FIX_RETURN'&&s.p1ValQuery)els.push(<div key="user-p1val2" className="otto-message user-message"><div className="otto-message-content">{s.p1ValQuery}</div></div>);
    }
    return els;
  };

  return(
    <div className={`otto-panel-wrapper ${s.ottoOpen?'open':''}`}>
      <div className="otto-panel">
        <div className="otto-header">
          <button className="otto-header-btn" onClick={()=>d({type:'SET_O',v:false})} title="Close"><XI size={12}/></button>
          <span className="otto-header-icon"><SI size={14}/></span>
          <span className="otto-header-title">Otto</span>
          <button className="otto-header-btn" onClick={()=>d({type:'SET_O',v:false})} title="Close"><XI size={12}/></button>
        </div>
        <div className="otto-steps-row"><span className="otto-steps-label"><SI size={10} color="var(--green-brand)"/> AI steps <CRI size={10}/></span></div>
        <div className="otto-conversation" ref={ref}>{renderConv()}</div>
        <div className="otto-input-bar">
          <div className="otto-input-row"><span style={{color:'var(--text-muted)',display:'flex'}}><PlI size={14}/></span><input className="otto-input-field" value={s.ottoInput} placeholder={s.cs==='P1_TABLE'?'Type a table name and press Enter':s.cs==='P2_QUERY'?'Type your search and press Enter':'Ask Otto anything or search'} readOnly={s.cs!=='P1_TABLE'&&s.cs!=='P2_QUERY'} onChange={e=>d({type:'SET_OI',v:e.target.value})} onKeyDown={e=>{if(e.key==='Enter'&&(s.cs==='P1_TABLE'||s.cs==='P2_QUERY')&&s.ottoInput.trim())d({type:'SUB_OI'});}}/>{(s.cs==='P1_TABLE'||s.cs==='P2_QUERY')?<div className="otto-input-mic" onClick={()=>{if(s.ottoInput.trim())d({type:'SUB_OI'});}}><SendI size={14}/></div>:<div className="otto-input-mic"><MiI size={14}/></div>}</div>
          <div className="otto-disclaimer">Be sure to check AI-generated content</div>
        </div>
      </div>
    </div>
  );
};

/* Screens */
const Landing=({s,d})=>{
  return<div className="screen-enter"><div className="page-content">
    <div className="landing-banner">
      <button className="landing-banner-close" onClick={()=>{}}><XI size={14}/></button>
      <div className="landing-banner-header"><Pill status="onboarding" label="Onboarding"/><div className="landing-banner-title">Get started with AI Search</div></div>
      <div className="landing-banner-desc">Set up AI Search across your organization's applications with a guided setup, or let AI configure it for you. During setup, you can expect:</div>
      <div className="landing-step-pills">
        <span className="landing-step-pill pending">Choose application</span>
        <span className="landing-step-pill pending">Add sources</span>
        <span className="landing-step-pill pending">Tune search results</span>
        <span className="landing-step-pill pending">Edit search interface</span>
        <span className="landing-step-pill pending">Validate</span>
      </div>
      <div className="landing-banner-actions">
        <button className="landing-banner-btn primary" onClick={()=>d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH})}>Configure manually</button>
        <button className="landing-banner-btn ai" onClick={()=>{d({type:'SET_O',v:true});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}><SI size={14} color="#fff"/> Configure using AI</button>
        <button className="landing-banner-btn ghost" onClick={()=>d({type:'SET_O',v:true})}><SI size={14} color="var(--text-primary)"/> Get help</button>
      </div>
    </div>
    <div className="landing-grid">
      <div className="card landing-card landing-grid-sys" style={{cursor:'pointer'}} onClick={()=>d({type:'SCR',v:SCREENS.SYSTEM_HEALTH})}>

const MapPill=({field,onSave,onRemove})=>{
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(field.mapping);
  useEffect(()=>{setVal(field.mapping);},[field.mapping]);
  const commit=()=>{onSave(val.trim()||field.mapping);setEditing(false);};
  if(editing)return<span style={{display:'inline-flex',alignItems:'center',border:'1px solid var(--green-brand)',borderRadius:'var(--radius-pill)',padding:'3px 10px',background:'var(--bg-card)'}}>
    <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();}} style={{border:'none',outline:'none',fontSize:11,width:Math.max(70,val.length*6.5),background:'transparent',color:'var(--text-primary)'}}/>
  </span>;
  return<span onClick={()=>setEditing(true)} style={{display:'inline-flex',alignItems:'center',gap:6,border:'1px solid var(--border-medium)',borderRadius:'var(--radius-pill)',padding:'3px 10px',fontSize:11,color:'var(--text-secondary)',background:'var(--bg-card)',cursor:'pointer',whiteSpace:'nowrap'}}>

};

    <div className="sp-controls">
      <div className="sp-control-select">Semantic search mode <CDI size={10}/></div>
      <div className="sp-control-select">Search quality <CDI size={10}/></div>
      <button style={{border:'1px solid var(--border-medium)',borderRadius:'var(--radius-sm)',padding:'5px 8px',background:'var(--bg-card)',display:'flex',alignItems:'center'}}><FtI size={12}/></button>
      <div className="sp-search-input"><SrI size={12}/><input placeholder="Try a search query." value={s.p1ValQuery} onChange={e=>d({type:'SET_P1VQ',v:e.target.value})} onKeyDown={e=>{if(e.key==='Enter')submit();}}/>{s.p1ValQuery&&<button style={{color:'var(--text-muted)'}} onClick={()=>d({type:'SET_P1VQ',v:''})}><XI size={10}/></button>}</div>
      <button className="sp-refresh-btn" onClick={submit}><RfI size={12}/> Search</button>
    </div>
    {showResults&&<div className="sp-filter-pills"><span className="sp-filter-pill">Catalog items (1) <button><XI size={8}/></button></span><span className="sp-filter-pill">Active records <button><XI size={8}/></button></span><span className="sp-clear-all">Clear all</span></div>}
    <div className="sp-layout">
      {!showResults&&!showNoResults&&<div style={{padding:60,textAlign:'center',color:'var(--text-muted)',fontSize:13,flex:1}}>Type a query above to preview search results for Catalog Items.</div>}
      {showNoResults&&<div style={{padding:60,textAlign:'center',flex:1}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text-primary)',marginBottom:4}}>No results found</div>
        <div style={{fontSize:12,color:'var(--text-secondary)'}}>Your search for "{s.p1ValQuery}" did not return any results.</div>
      </div>}
      {showResults&&<>
        {showRef&&<div className="sp-refine"><div className="sp-refine-header">Refine list <button onClick={()=>d({type:'REF',v:false})}><XI size={10}/></button></div><div className="sp-refine-section"><div className="sp-refine-section-title">Source</div><div className="sp-refine-item selected">Catalog items (1)</div><div className="sp-refine-item">Knowledge bases (0+)</div><div className="sp-refine-item">HR Cases (0+)</div></div><div className="sp-refine-section"><div className="sp-refine-section-title">Category</div><div className="sp-refine-item selected">IT Hardware</div><div className="sp-refine-item">Software</div><div className="sp-refine-item">Facilities</div></div><div style={{fontSize:11,color:'var(--blue)',cursor:'pointer'}}>Clear all</div></div>}
        <div className="sp-results">
          <div className="sp-results-header">Search results <span className="ep-sources-count">{sp.count}</span></div>
          <div className="sp-results-subheader">Results for "{q}"</div>
          <div className="card sp-result-card"><div className="sp-result-badge">{sp.top.type}</div><div className="sp-result-title">{sp.top.title}</div><div className="sp-result-desc">{sp.top.desc}</div><div className="sp-result-updated">Updated {sp.top.updated}</div><div className="sp-result-scores"><span>Final score: <strong>{sp.top.score.toFixed(3)}</strong></span><span>Match type: <strong>{sp.top.match}</strong></span><span>Language: <strong>{sp.top.lang}</strong></span></div><div className="sp-result-sysid">SysID: 3A21CFEE... <button><CpI size={10}/> copy</button></div>
            <div className="sp-why-ranked"><div className="sp-why-ranked-toggle" onClick={()=>d({type:'WHY',v:!s.whyOpen})}>{s.whyOpen?<CDI size={12}/>:<CRI size={12}/>} Why ranked #1?</div>{s.whyOpen&&<div className="sp-why-content"><div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:12}}>This result ranked first due to strong title match in keyword search and solid body relevance in semantic search.</div><div className="sp-signal-cards"><div className="sp-signal-card"><div className="sp-signal-card-label">Keyword</div><div className="sp-signal-card-type">Primary</div><div className="sp-signal-card-field">Title</div><div className="sp-signal-card-boost">{sp.top.kwBoost}</div></div><div className="sp-signal-card"><div className="sp-signal-card-label">Semantic</div><div className="sp-signal-card-type">Primary</div><div className="sp-signal-card-field">Body</div><div className="sp-signal-card-boost">{sp.top.semBoost}</div></div></div><table className="sp-boost-table"><thead><tr><th>Field</th><th>Boost Rule</th><th>Value</th></tr></thead><tbody><tr><td>boost_0091</td><td>+150%</td><td>Request New Laptop</td></tr><tr><td>boost_0092</td><td>-8%</td><td>Request New Laptop</td></tr></tbody></table><div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:4}}>Boost type: Up-boost · Boost score: +812</div><div style={{display:'flex',gap:8,margin:'12px 0 8px'}}><div style={{fontSize:11,padding:'3px 8px',background:'var(--bg-tag-gray)',borderRadius:'var(--radius-sm)'}}>Keyword model</div><div style={{fontSize:11,padding:'3px 8px',background:'var(--bg-tag-gray)',borderRadius:'var(--radius-sm)'}}>Semantic model</div></div><table className="sp-contribution-table"><thead><tr><th>Signal</th><th>% Contribution</th></tr></thead><tbody><tr><td>Title</td><td>72.40%</td></tr><tr><td>Body</td><td>27.60%</td></tr></tbody></table></div>}</div>
          </div>
        </div>
        <div className="sp-detail" style={{paddingBottom:60}}>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Query</div><div className="sp-detail-row"><span className="sp-detail-row-label">Query entered:</span><span className="sp-detail-row-value">{dt.qEntered}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Terms detected:</span><span className="sp-detail-row-value">{dt.terms}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Query language:</span><span className="sp-detail-row-value">{dt.qLang}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Terms in query:</span><span className="sp-detail-row-value">{dt.terms}</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Synonym</div><div className="sp-detail-row"><span className="sp-detail-row-label">Applied:</span><span className="sp-detail-row-value">{dt.synApplied}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Term expanded:</span><span className="sp-detail-row-value">{dt.termExp}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Expanded to:</span><span className="sp-detail-row-value">{dt.expTo}</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Spell check</div><div className="sp-detail-row"><span className="sp-detail-row-label">Triggered:</span><span className="sp-detail-row-value">{dt.spellCheck}</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Stopwords</div><div className="sp-detail-row"><span className="sp-detail-row-label">Used:</span><span className="sp-detail-row-value">Yes</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Ranking model</div><div className="sp-detail-row"><span className="sp-detail-row-label">Mode:</span><span className="sp-detail-row-value">{dt.rankMode}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Embedding:</span><span className="sp-detail-row-value">{dt.embed}</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Data sources</div><div className="sp-detail-row"><span className="sp-detail-row-label">Filtered:</span><span className="sp-detail-row-value">{dt.dataSrc}</span></div></div>
          <div className="sp-detail-section"><div className="sp-detail-section-title">Latency</div><div className="sp-detail-row"><span className="sp-detail-row-label">Pre-process:</span><span className="sp-detail-row-value">{dt.lat.pre}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Search query:</span><span className="sp-detail-row-value">{dt.lat.search}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Genius Result:</span><span className="sp-detail-row-value">{dt.lat.genius}</span></div><div className="sp-detail-row"><span className="sp-detail-row-label">Security:</span><span className="sp-detail-row-value highlight">{dt.lat.sec}</span></div><div className="sp-detail-row" style={{borderTop:'1px solid var(--border-light)',paddingTop:4,marginTop:4}}><span className="sp-detail-row-label" style={{fontWeight:600}}>Total:</span><span className="sp-detail-row-value" style={{fontWeight:700}}>{dt.lat.total}</span></div></div>
        </div>
      </>}
    </div>
  </>;
};

const SearchPreview=({s,d})=>{
  const isP1Val=s.scenario===5&&(s.cs||'').startsWith('P1_VAL');
  const app=DATA.applications.find(a=>a.id===s.selApp)||DATA.applications[0];
  return<div className="screen-enter" style={{display:'flex',flexDirection:'column',flex:1}}>
    <div className="top-bar"><button style={{display:'flex',alignItems:'center',color:'var(--green-brand)',cursor:'pointer'}} onClick={()=>d({type:'TOG_O'})}><SI size={16}/></button><div className="breadcrumb"><span className="breadcrumb-link" onClick={()=>d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH})}>Configuration</span><span className="breadcrumb-sep">{'>'}</span><span className="breadcrumb-active">{isP1Val?app.name:'Employee Portal'}</span><CDI size={10}/></div></div>
    <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border-light)',background:'var(--bg-card)'}}>
      <div className="ep-header" style={{marginBottom:12}}><span className="ep-title">{isP1Val?app.name:'Employee Portal'}</span><Pill status="active-status"/><span className="ep-modified">Modified 2 days ago</span><button className="ep-open-btn">Open <AUR size={12}/></button></div>
      <div className="ep-tabs" style={{marginBottom:0}}>
        <div className="ep-tab" onClick={()=>d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL})}>Sources</div>
        <div className="ep-tab">Tune Search Results</div>
        <div className="ep-tab" onClick={()=>{if(isP1Val)d({type:'EP_TAB',v:'Interface'});if(isP1Val)d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});}}>Edit Search Interface</div>
        <div className="ep-tab active">Review and validate</div>
      </div>
    </div>
    {isP1Val?<P1ValidatePreview s={s} d={d}/>:<SearchPreviewContent s={s} d={d}/>}
  </div>;
};

const DemoBar=({s,d})=>{
  const isP1=s.scenario===5&&s.cs==='P1_APP';
  const isP2=s.scenario===5&&s.cs==='P2_APP';
  const isP3=s.scenario===5&&s.cs==='P3_CHECK';
  return(
  <div className="demo-bar">
    <span className="demo-bar-label">AI Search Demo</span>
    <button className={`demo-bar-btn ${isP1?'active':''}`} onClick={()=>{d({type:'SCEN',v:5,cs:'P1_APP'});d({type:'SCR',v:SCREENS.CONFIGURE_SEARCH});}}>Path 1: Setup</button>
    <button className={`demo-bar-btn ${isP2?'active':''}`} onClick={()=>{d({type:'SCEN',v:5,cs:'P2_APP'});d({type:'SEL_APP',v:'it-self-service'});d({type:'SCR',v:SCREENS.EMPLOYEE_PORTAL});}}>Path 2: Validate</button>
    <button className={`demo-bar-btn ${isP3?'active':''}`} onClick={()=>{d({type:'SCEN',v:5,cs:'P3_CHECK'});d({type:'SCR',v:SCREENS.SYSTEM_HEALTH});}}>Path 3: System Health</button>
    <button className="demo-bar-btn reset" onClick={()=>d({type:'RESET'})}>Reset</button>
  </div>
  );
};

const App=()=>{
  const[s,d]=useReducer(red,init);
  const scr=()=>{switch(s.currentScreen){
    case SCREENS.LANDING:return<Landing s={s} d={d}/>;
    case SCREENS.CONFIGURE_SEARCH:return<ConfigSearch s={s} d={d}/>;
    case SCREENS.EMPLOYEE_PORTAL:return<AppDetail s={s} d={d}/>;
    case SCREENS.SYSTEM_HEALTH:return<SysHealth s={s} d={d}/>;
    case SCREENS.SEARCH_PREVIEW:return<SearchPreview s={s} d={d}/>;
    default:return<Landing s={s} d={d}/>;
  }};
  return<>
    <div style={{display:'flex',height:'100vh',width:'100vw',overflow:'hidden',paddingBottom:40}}>
      <LeftNav d={d} cs={s.currentScreen}/>
      <div style={{display:'flex',flex:1,minWidth:0,height:'100%'}}>
        <Otto state={s} d={d}/>
        <div className={`main-content ${s.ottoOpen?'otto-open':''}`}>{scr()}</div>
      </div>
    </div>
    <DemoBar s={s} d={d}/>
  </>;
};
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
